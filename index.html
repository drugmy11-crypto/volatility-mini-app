<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a, #111827);
            color: #fff;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,234,0,0.15);
        }
        .mini-header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Головний екран -->
    <div id="main-screen">
        <div class="px-6 pt-10 pb-6 text-center">
            <h1 class="text-3xl font-black tracking-tighter gold">VOLATILITY</h1>
            <p class="text-yellow-400 text-xs -mt-1">MANAGER</p>
        </div>

        <div class="px-5 grid grid-cols-2 gap-4">

            <!-- BTC -->
            <div onclick="openDetail('BTC')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
                <div class="flex items-center gap-4">
                    <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="w-12 h-12" alt="BTC">
                    <div class="flex-1">
                        <div class="font-bold text-2xl">BTC</div>
                        <div id="btc-price" class="text-2xl font-bold">96 897.34</div>
                    </div>
                </div>
                <div id="btc-change" class="mt-3 text-green-400 font-medium text-sm">+2.34%</div>
            </div>

            <!-- ETH -->
            <div onclick="openPair('ETHUSDT')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
                <div class="flex items-center gap-4">
                    <img src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" class="w-12 h-12" alt="ETH">
                    <div class="flex-1">
                        <div class="font-bold text-2xl">ETH</div>
                        <div id="eth-price" class="text-2xl font-bold">3 245.67</div>
                    </div>
                </div>
                <div id="eth-change" class="mt-3 text-green-400 font-medium text-sm">+1.87%</div>
            </div>

            <!-- SOL -->
            <div onclick="openPair('SOLUSDT')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
                <div class="flex items-center gap-4">
                    <img src="https://assets.coingecko.com/coins/images/4128/small/solana.png" class="w-12 h-12" alt="SOL">
                    <div class="flex-1">
                        <div class="font-bold text-2xl">SOL</div>
                        <div id="sol-price" class="text-2xl font-bold">184.56</div>
                    </div>
                </div>
                <div id="sol-change" class="mt-3 text-red-400 font-medium text-sm">-0.92%</div>
            </div>

            <!-- XRP -->
            <div onclick="openPair('XRPUSDT')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
                <div class="flex items-center gap-4">
                    <img src="https://assets.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png" class="w-12 h-12" alt="XRP">
                    <div class="flex-1">
                        <div class="font-bold text-2xl">XRP</div>
                        <div id="xrp-price" class="text-2xl font-bold">2.34</div>
                    </div>
                </div>
                <div id="xrp-change" class="mt-3 text-green-400 font-medium text-sm">+4.12%</div>
            </div>

        </div>
    </div>

    <!-- Детальний екран BTC -->
    <div id="detail-screen" class="hidden min-h-screen bg-[#0a0a0a]">

        <!-- Фіксована міні-карточка зверху -->
        <div class="mini-header fixed top-0 left-0 right-0 z-50 px-5 py-4 border-b border-white/10 flex items-center gap-4">
            <button onclick="backToMain()" class="text-3xl text-zinc-400 pr-4">←</button>
            <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="w-9 h-9">
            <div class="flex-1">
                <div class="font-bold text-xl">BTC</div>
                <div id="mini-price" class="text-2xl font-bold">96 897.34</div>
            </div>
            <div id="mini-change" class="text-green-400 font-medium">+2.34%</div>
        </div>

        <div class="pt-24 px-5 space-y-6">

            <!-- Golden Cloud -->
            <div class="glass rounded-3xl p-6 text-center">
                <div class="text-yellow-400 text-sm tracking-widest">GOLDEN CLOUD ACTIVE</div>
                <div class="text-5xl font-black gold mt-2">1.74x</div>
                <div class="text-zinc-400 mt-1">Сильне розширення</div>
            </div>

            <!-- Просадка від ATH -->
            <div class="glass rounded-3xl p-6">
                <div class="flex justify-between mb-3">
                    <span class="text-zinc-400">Просадка від ATH</span>
                    <span class="text-red-400 font-medium">-37.1%</span>
                </div>
                <div class="h-2.5 bg-zinc-800 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-red-500 to-orange-500 rounded-full w-[63%]"></div>
                </div>
                <div class="text-xs text-zinc-400 mt-2">ATH: $124 000 (2024)</div>
            </div>

            <!-- Ринковий цикл -->
            <div class="glass rounded-3xl p-6">
                <div class="text-zinc-400 mb-2">Ринковий цикл</div>
                <div class="inline-flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-6 py-3 rounded-2xl font-medium">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    БИЧИЙ ЦИКЛ
                </div>
            </div>

            <!-- Халвинг + Прогноз -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass rounded-3xl p-6">
                    <div class="text-xs text-zinc-400">Після халвінгу</div>
                    <div class="text-3xl font-bold mt-1">412 днів</div>
                </div>
                <div class="glass rounded-3xl p-6">
                    <div class="text-xs text-zinc-400">До наступного</div>
                    <div class="text-3xl font-bold mt-1">640 днів</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        function openDetail(coin) {
            if (coin === 'BTC') {
                document.getElementById("main-screen").classList.add("hidden");
                document.getElementById("detail-screen").classList.remove("hidden");
            }
        }

        function backToMain() {
            document.getElementById("detail-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
        }

        function openPair(symbol) {
            const url = `https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}&interval=15&theme=dark`;
            tg.openLink(url, { try_instant_view: true });
        }
    </script>
</body>
</html>
