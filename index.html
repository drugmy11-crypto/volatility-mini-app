<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(180deg, #0a0a0a, #111827); color: #fff; font-family: system-ui; }
        .gold { color: #ffea00; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,234,0,0.2); }
        #chartContainer { width: 100%; height: 460px; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <div class="px-5 pt-10 pb-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-yellow-400 to-amber-500 rounded-2xl flex items-center justify-center text-3xl shadow-xl">⚡</div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter">VOLATILITY</h1>
                    <p class="text-yellow-400 text-sm -mt-1">MANAGER</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Симуляція -->
    <div class="px-5">
        <button onclick="simulateSignal()" 
                class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 text-black font-black py-8 rounded-3xl text-2xl shadow-2xl active:scale-95 transition-all">
            🟡 СИМУЛЮВАТИ СИГНАЛ
        </button>
    </div>

    <!-- Сигнали -->
    <div class="px-5 mt-10">
        <h2 class="text-xl font-semibold mb-5">Останні сигнали</h2>
        <div id="signals" class="space-y-6"></div>
    </div>

    <!-- Модальне вікно з графіком -->
    <div id="chartModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="w-full max-w-lg bg-zinc-950 rounded-3xl overflow-hidden">
            <div class="flex justify-between items-center px-6 py-4 border-b border-white/10">
                <div id="modalTitle" class="font-bold text-xl gold"></div>
                <button onclick="closeChart()" class="text-3xl text-zinc-400">✕</button>
            </div>
            <div id="chartContainer"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        let chart = null;
        let series = null;

        function openChart(symbol, tf) {
            document.getElementById("modalTitle").innerHTML = `${symbol} <span class="text-zinc-400">${tf}</span>`;
            document.getElementById("chartModal").classList.remove("hidden");

            const container = document.getElementById("chartContainer");
            container.innerHTML = "";

            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 460,
                layout: { backgroundColor: '#111827', textColor: '#ccc' },
                grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Magnet },
                timeScale: { timeVisible: true, secondsVisible: false }
            });

            series = chart.addCandlestickSeries();

            // Демо дані (можна замінити на реальні)
            const data = [
                { time: '2025-02-20', open: 68200, high: 68500, low: 67900, close: 68405 },
                { time: '2025-02-21', open: 68405, high: 69200, low: 68100, close: 68950 },
                { time: '2025-02-22', open: 68950, high: 69500, low: 68700, close: 69120 },
            ];
            series.setData(data);

            // Золоте облако як зона
            const cloudLine = chart.addLineSeries({ color: '#ffea00', lineWidth: 3 });
            cloudLine.setData([
                { time: '2025-02-21', value: 69100 },
                { time: '2025-02-22', value: 69500 }
            ]);
        }

        function closeChart() {
            document.getElementById("chartModal").classList.add("hidden");
            if (chart) chart.remove();
        }

        function addSignal(symbol, tf, price, expand) {
            const div = document.getElementById("signals");
            const time = new Date().toLocaleTimeString("uk-UA", {hour:"2-digit", minute:"2-digit"});

            const html = `
                <div class="card rounded-3xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-3xl font-bold gold">${symbol}</span>
                            <span class="ml-4 text-zinc-400">${tf}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-400">${time}</div>
                            <div class="text-3xl font-bold">${parseInt(price).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="mt-6 flex gap-4">
                        <div class="flex-1">
                            <div class="text-yellow-400 text-lg">🟡 Золоте облако</div>
                            <div class="text-yellow-400">Expand <span class="font-bold">${expand}x</span></div>
                        </div>
                        <button onclick="openChart('${symbol}', '${tf}')" 
                                class="flex-1 bg-gradient-to-r from-yellow-400 to-amber-500 text-black font-bold py-4 rounded-2xl transition active:scale-95">
                            📈 Відкрити графік
                        </button>
                    </div>
                </div>
            `;
            div.innerHTML = html + div.innerHTML;
        }

        function simulateSignal() {
            const symbols = ["BTCUSDT","ETHUSDT","SOLUSDT"];
            const tfs = ["15m","30m","1h"];
            const s = symbols[Math.floor(Math.random()*symbols.length)];
            const t = tfs[Math.floor(Math.random()*tfs.length)];
            const p = Math.floor(40000 + Math.random()*70000);
            const e = (1.35 + Math.random()*0.65).toFixed(2);

            addSignal(s, t, p, e);
        }

        window.onload = () => setTimeout(simulateSignal, 800);
    </script>
</body>
</html>
