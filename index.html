<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a, #111827);
            color: #fff;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,234,0,0.15);
        }
        .coin-logo {
            width: 42px;
            height: 42px;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="px-6 pt-10 pb-4 text-center">
        <h1 class="text-3xl font-black tracking-tighter gold">VOLATILITY</h1>
        <p class="text-yellow-400 text-xs -mt-1">MANAGER</p>
    </div>

    <div class="px-5 grid grid-cols-2 gap-4">

        <!-- BTC -->
        <div onclick="openPair('BTCUSDT')" class="glass rounded-3xl p-4 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-3">
                <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="coin-logo" alt="BTC">
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-xl">BTC</div>
                    <div id="btc-price" class="text-xl font-bold">96 897.34</div>
                </div>
            </div>
            <div id="btc-change" class="text-green-400 text-sm mt-1">+2.34%</div>
        </div>

        <!-- ETH -->
        <div onclick="openPair('ETHUSDT')" class="glass rounded-3xl p-4 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-3">
                <img src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" class="coin-logo" alt="ETH">
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-xl">ETH</div>
                    <div id="eth-price" class="text-xl font-bold">3 245.67</div>
                </div>
            </div>
            <div id="eth-change" class="text-green-400 text-sm mt-1">+1.87%</div>
        </div>

        <!-- SOL -->
        <div onclick="openPair('SOLUSDT')" class="glass rounded-3xl p-4 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-3">
                <img src="https://assets.coingecko.com/coins/images/4128/small/solana.png" class="coin-logo" alt="SOL">
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-xl">SOL</div>
                    <div id="sol-price" class="text-xl font-bold">184.56</div>
                </div>
            </div>
            <div id="sol-change" class="text-red-400 text-sm mt-1">-0.92%</div>
        </div>

        <!-- XRP -->
        <div onclick="openPair('XRPUSDT')" class="glass rounded-3xl p-4 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-3">
                <img src="https://assets.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png" class="coin-logo" alt="XRP">
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-xl">XRP</div>
                    <div id="xrp-price" class="text-xl font-bold">2.34</div>
                </div>
            </div>
            <div id="xrp-change" class="text-green-400 text-sm mt-1">+4.12%</div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        const pairs = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"];

        async function updatePrices() {
            for (let symbol of pairs) {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
                    const data = await res.json();

                    const price = parseFloat(data.lastPrice);
                    const change = parseFloat(data.priceChangePercent);

                    const base = symbol.replace("USDT", "").toLowerCase();

                    const priceEl = document.getElementById(base + "-price");
                    const changeEl = document.getElementById(base + "-change");

                    if (priceEl) priceEl.textContent = price.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2});
                    if (changeEl) {
                        changeEl.textContent = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
                        changeEl.className = change >= 0 
                            ? "text-green-400 text-sm mt-1" 
                            : "text-red-400 text-sm mt-1";
                    }
                } catch(e) {}
            }
        }

        function openPair(symbol) {
            const url = `https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}&interval=15&theme=dark`;
            tg.openLink(url, { try_instant_view: true });
        }

        // Оновлення кожні 300 мс
        setInterval(updatePrices, 300);
        updatePrices();

        window.onload = () => setTimeout(updatePrices, 600);
    </script>
</body>
</html>
