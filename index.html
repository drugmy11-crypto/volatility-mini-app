<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a, #111827);
            color: #fff;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,234,0,0.18);
        }
        .mini-header {
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Головний екран -->
    <div id="main-screen" class="min-h-screen">
        <div class="px-6 pt-10 pb-6 text-center">
            <h1 class="text-3xl font-black tracking-tighter gold">VOLATILITY</h1>
            <p class="text-yellow-400 text-xs -mt-1">MANAGER</p>
        </div>

        <div class="px-5 grid grid-cols-2 gap-4">
            <div onclick="openDetail('BTC')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
                <div class="flex items-center gap-4">
                    <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="w-12 h-12" alt="BTC">
                    <div>
                        <div class="font-bold text-2xl">BTC</div>
                        <div id="btc-price" class="text-2xl font-bold">96 897.34</div>
                    </div>
                </div>
                <div id="btc-change" class="mt-3 text-green-400 font-medium text-sm">+2.34%</div>
            </div>

            <!-- Інші картки (ETH, SOL, XRP) можна додати аналогічно -->
            <!-- Для прикладу залишив тільки BTC, інші можна розкоментувати пізніше -->
        </div>
    </div>

    <!-- Розгорнутий екран для пари (BTC) -->
    <div id="detail-screen" class="hidden min-h-screen bg-[#0a0a0a]">

        <!-- Фіксована міні-карточка зверху -->
        <div id="mini-header" class="mini-header fixed top-0 left-0 right-0 z-50 px-5 py-4 border-b border-white/10 flex items-center gap-4">
            <button onclick="backToMain()" class="text-3xl text-zinc-400 pr-3">←</button>
            <img id="mini-logo" src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="w-9 h-9">
            <div class="flex-1">
                <div class="font-bold text-xl">BTC</div>
                <div id="mini-price" class="text-2xl font-bold">96 897.34</div>
            </div>
            <div id="mini-change" class="text-green-400 font-medium text-right">+2.34%</div>
        </div>

        <div class="pt-24 px-5 pb-24">

            <!-- Golden Cloud блок -->
            <div class="glass rounded-3xl p-6 mb-8 text-center">
                <div class="text-yellow-400 text-sm tracking-widest">GOLDEN CLOUD ACTIVE</div>
                <div class="text-5xl font-black gold mt-2">1.74x</div>
                <div class="text-zinc-400">Сильне розширення хмари</div>
            </div>

            <!-- Просадка від ATH -->
            <div class="glass rounded-3xl p-6 mb-6">
                <div class="flex justify-between mb-3">
                    <span class="text-zinc-400">Просадка від ATH</span>
                    <span class="text-red-400 font-medium">-37.1%</span>
                </div>
                <div class="h-2.5 bg-zinc-800 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-red-500 to-orange-500 rounded-full w-[63%]"></div>
                </div>
                <div class="text-xs text-zinc-400 mt-2">ATH: $124 000 (2024)</div>
            </div>

            <!-- Рыночный цикл -->
            <div class="glass rounded-3xl p-6 mb-6">
                <div class="text-zinc-400 mb-2">Ринковий цикл</div>
                <div class="inline-flex items-center gap-2 bg-emerald-500/10 text-emerald-400 px-5 py-2 rounded-2xl font-medium">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    БИЧИЙ ЦИКЛ
                </div>
            </div>

            <!-- Халвинг -->
            <div class="glass rounded-3xl p-6 mb-6">
                <div class="grid grid-cols-2 gap-8">
                    <div>
                        <div class="text-xs text-zinc-400">Після останнього халвінгу</div>
                        <div class="text-3xl font-bold">412 днів</div>
                    </div>
                    <div>
                        <div class="text-xs text-zinc-400">До наступного халвінгу</div>
                        <div class="text-3xl font-bold">640 днів</div>
                    </div>
                </div>
            </div>

            <!-- Прогноз піку -->
            <div class="glass rounded-3xl p-6">
                <div class="text-zinc-400 text-sm mb-3">Прогноз піку циклу</div>
                <div class="flex justify-center">
                    <div class="relative w-44 h-44">
                        <svg class="w-44 h-44 -rotate-90" viewBox="0 0 42 42">
                            <circle cx="21" cy="21" r="15" fill="none" stroke="#27272a" stroke-width="7"></circle>
                            <circle cx="21" cy="21" r="15" fill="none" stroke="#67e8f9" stroke-width="7" stroke-dasharray="94" stroke-dashoffset="28" stroke-linecap="round"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center flex-col">
                            <div class="text-5xl font-black">180</div>
                            <div class="text-xs text-zinc-400 -mt-1">днів до піку</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        function openDetail(coin) {
            document.getElementById("main-screen").classList.add("hidden");
            document.getElementById("detail-screen").classList.remove("hidden");

            if (coin === 'BTC') {
                document.getElementById("mini-price").textContent = "96 897.34";
                document.getElementById("mini-change").textContent = "+2.34%";
            }
        }

        function backToMain() {
            document.getElementById("detail-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
        }

        // Для тесту
        window.onload = () => {
            // Можна додати авто-оновлення цін пізніше
        };
    </script>
</body>
</html>
