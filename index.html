<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: system-ui; }
        .tab-active { border-bottom: 3px solid #ffea00; color: #ffea00; }
        .gold { color: #ffea00; }
    </style>
</head>
<body class="p-4 min-h-screen pb-20">

    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold">VOLATILITY MANAGER</h1>
            <div class="flex items-center gap-2 text-green-400">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                ONLINE
            </div>
        </div>

        <div onclick="simulateSignal()" class="bg-gradient-to-r from-yellow-500 to-amber-500 text-black font-bold py-6 rounded-3xl text-center text-xl cursor-pointer hover:scale-105 transition">
            🟡 СИМУЛЮВАТИ ЗОЛОТЕ ОБЛАКО
        </div>

        <div id="signals" class="mt-8 space-y-4"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function simulateSignal() {
            const symbols = ["BTCUSDT","ETHUSDT","SOLUSDT"];
            const s = symbols[Math.floor(Math.random()*symbols.length)];
            const price = Math.floor(50000 + Math.random()*50000);
            const expand = (1.3 + Math.random()*0.5).toFixed(2);
            const time = new Date().toLocaleTimeString("uk-UA");

            const html = `
                <div class="bg-zinc-900 rounded-3xl p-5 border border-yellow-400/30">
                    <div class="flex justify-between">
                        <div class="font-bold text-xl gold">${s}</div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-400">${time}</div>
                            <div class="text-2xl">${price}</div>
                        </div>
                    </div>
                    <div class="mt-2 text-yellow-400">🟡 Золоте облако • ${expand}x</div>
                </div>
            `;
            document.getElementById("signals").innerHTML = html + document.getElementById("signals").innerHTML;

            tg.showPopup({title: "🟡 СИГНАЛ!", message: `${s}\nЦіна: ${price}\nExpand: ${expand}x`, buttons: [{type:"ok"}]});
        }

        // Перший сигнал при завантаженні
        window.onload = () => setTimeout(simulateSignal, 800);
    </script>
</body>
</html>
