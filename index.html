<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(180deg, #0a0a0a, #111827); color: #fff; font-family: system-ui; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,234,0,0.15); }
        .gold { color: #ffea00; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <div class="px-5 pt-12 pb-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-yellow-400 to-amber-500 rounded-2xl flex items-center justify-center text-3xl shadow-xl">⚡</div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter">VOLATILITY</h1>
                    <p class="text-yellow-400 text-sm -mt-1">MANAGER</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Моніторинг пар -->
    <div class="px-5">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-semibold">Моніторинг пар</h2>
            <button onclick="updateAllPrices()" 
                    class="text-yellow-400 text-sm flex items-center gap-1 hover:text-yellow-300 transition">
                <i class="fas fa-sync-alt"></i> Оновити
            </button>
        </div>

        <div id="pairs-list" class="space-y-3"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        // Порядок за капіталізацією
        const pairs = [
            "BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", 
            "BNBUSDT", "DOGEUSDT", "TONUSDT", "ADAUSDT"
        ];

        async function updateAllPrices() {
            const container = document.getElementById("pairs-list");
            container.innerHTML = "";

            for (let symbol of pairs) {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
                    const data = await res.json();
                    const price = parseFloat(data.price);

                    const html = `
                        <div class="glass rounded-3xl px-6 py-5 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <span class="text-2xl font-bold">${symbol.replace("USDT", "")}</span>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-white">${price.toLocaleString('ru-RU')}</div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                } catch(e) {
                    console.log("Помилка з", symbol);
                }
            }
        }

        // Перше завантаження
        window.onload = () => {
            updateAllPrices();
        };
    </script>
</body>
</html>
