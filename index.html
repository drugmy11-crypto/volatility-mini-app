<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(180deg, #0a0a0a, #111827); color: #fff; font-family: system-ui; }
        .gold { color: #ffea00; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,234,0,0.2); }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <div class="px-5 pt-10 pb-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-yellow-400 to-amber-500 rounded-2xl flex items-center justify-center text-3xl shadow-xl">⚡</div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter">VOLATILITY</h1>
                    <p class="text-yellow-400 text-sm -mt-1">MANAGER</p>
                </div>
            </div>
            <div class="text-right">
                <div id="live-price" class="text-4xl font-bold gold">68 405</div>
                <div id="live-pair" class="text-xs text-green-400">BTCUSDT • +0.47%</div>
            </div>
        </div>
    </div>

    <!-- Симуляція -->
    <div class="px-5">
        <button onclick="simulateSignal()" 
                class="w-full bg-gradient-to-r from-yellow-400 to-amber-500 text-black font-black py-8 rounded-3xl text-2xl shadow-2xl active:scale-95 transition-all">
            🟡 СИМУЛЮВАТИ СИГНАЛ
        </button>
    </div>

    <!-- Сигнали -->
    <div class="px-5 mt-10">
        <h2 class="text-xl font-semibold mb-5">Останні сигнали</h2>
        <div id="signals" class="space-y-6"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        let currentPrice = 68405;

        function formatPrice(price) {
            return Math.floor(price).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        // Оновлення реальної ціни кожні 450 мс
        async function updateLivePrice() {
            try {
                const res = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT");
                const data = await res.json();
                currentPrice = parseFloat(data.price);
                document.getElementById("live-price").textContent = formatPrice(currentPrice);
            } catch(e) {}
        }

        function openChart(symbol, tf) {
            const interval = tf === "5m" ? "5" : tf === "15m" ? "15" : tf === "30m" ? "30" : "60";
            const url = `https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}&interval=${interval}&theme=dark`;
            tg.openLink(url, { try_instant_view: true });
        }

        function addSignal(symbol, tf, price, expand) {
            const div = document.getElementById("signals");
            const time = new Date().toLocaleTimeString("uk-UA", {hour:"2-digit", minute:"2-digit"});

            const html = `
                <div class="card rounded-3xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-3xl font-bold gold">${symbol}</span>
                            <span class="ml-4 text-zinc-400">${tf}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-400">${time}</div>
                            <div class="text-3xl font-bold">${formatPrice(price)}</div>
                        </div>
                    </div>
                    <div class="mt-6 flex gap-4">
                        <div class="flex-1">
                            <div class="text-yellow-400 text-lg">🟡 Золоте облако</div>
                            <div class="text-yellow-400">Expand <span class="font-bold">${expand}x</span></div>
                        </div>
                        <button onclick="openChart('${symbol}', '${tf}')" 
                                class="flex-1 bg-gradient-to-r from-yellow-400 to-amber-500 text-black font-bold py-4 rounded-2xl transition active:scale-95">
                            📈 Графік
                        </button>
                    </div>
                </div>
            `;
            div.innerHTML = html + div.innerHTML;
        }

        function simulateSignal() {
            const symbols = ["BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT"];
            const tfs = ["5m","15m","30m","1h"];
            const s = symbols[Math.floor(Math.random()*symbols.length)];
            const t = tfs[Math.floor(Math.random()*tfs.length)];

            const variation = currentPrice * (Math.random() * 0.03 - 0.015);
            const signalPrice = currentPrice + variation;
            const e = (1.35 + Math.random()*0.65).toFixed(2);

            addSignal(s, t, signalPrice, e);
        }

        // Запуск оновлення ціни
        setInterval(updateLivePrice, 450);
        updateLivePrice();

        // Авто-симуляція
        setInterval(() => {
            if (Math.random() > 0.65) simulateSignal();
        }, 22000);

        window.onload = () => setTimeout(simulateSignal, 800);
    </script>
</body>
</html>
