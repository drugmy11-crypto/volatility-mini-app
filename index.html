<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #0f172a 100%);
            color: #fff;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,234,0,0.2);
        }
        .gold-glow {
            text-shadow: 0 0 30px #ffea00, 0 0 60px #ffea00;
        }
        .cloud {
            animation: cloudFloat 25s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header + Live BTC -->
    <div class="px-5 pt-12 pb-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-yellow-300 to-amber-500 rounded-2xl flex items-center justify-center shadow-2xl shadow-yellow-500/50">
                    ⚡
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter gold-glow">VOLATILITY</h1>
                    <p class="text-yellow-400 -mt-1 text-sm">MANAGER</p>
                </div>
            </div>
            <div class="text-right">
                <div class="text-xs text-green-400 flex items-center justify-end gap-1.5">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    LIVE
                </div>
                <div id="live-price" class="text-5xl font-bold gold-glow">96 897</div>
                <div id="live-symbol" class="text-sm text-yellow-400">BTCUSDT</div>
            </div>
        </div>
    </div>

    <!-- Golden Cloud Banner -->
    <div class="mx-5 glass rounded-3xl p-5 mb-8 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 text-[120px] opacity-10 cloud">☁️</div>
        <div class="text-center">
            <div class="text-yellow-400 text-sm font-medium tracking-widest">GOLDEN CLOUD ACTIVE</div>
            <div class="text-2xl font-bold mt-1">Очікуємо потужний сигнал</div>
        </div>
    </div>

    <!-- Pairs -->
    <div class="px-5">
        <h2 class="text-lg font-medium mb-4 text-zinc-400">Моніторинг пар</h2>
        <div id="pairs" class="space-y-3"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        const pairs = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"];

        async function updatePrices() {
            const container = document.getElementById("pairs");
            container.innerHTML = "";

            for (let symbol of pairs) {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
                    const data = await res.json();
                    const price = parseFloat(data.price);

                    const html = `
                        <div class="glass rounded-3xl p-5 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="text-2xl font-bold">${symbol.replace("USDT","")}</div>
                                <div class="text-xs text-green-400">• LIVE</div>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold">${price.toLocaleString('ru-RU')}</div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += html;
                } catch(e) {}
            }
        }

        // Оновлення кожні 400 мс
        setInterval(updatePrices, 400);
        updatePrices();

        window.onload = () => {
            setTimeout(updatePrices, 800);
        };
    </script>
</body>
</html>
