<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #111827 100%);
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .gold-gradient { background: linear-gradient(90deg, #ffea00, #facc15, #eab308); }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,234,0,0.15);
        }
        .signal {
            animation: signalPop 0.5s ease-out forwards;
        }
        @keyframes signalPop {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .live-dot {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <div class="px-5 pt-10 pb-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 gold-gradient rounded-2xl flex items-center justify-center text-3xl shadow-lg">⚡</div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter">VOLATILITY</h1>
                    <p class="text-yellow-400 text-sm -mt-1">MANAGER</p>
                </div>
            </div>
            <div class="text-right">
                <div id="live-price" class="text-4xl font-bold text-yellow-300">68 405</div>
                <div class="flex items-center gap-1.5 justify-end text-green-400 text-sm">
                    <div class="w-2 h-2 bg-green-400 rounded-full live-dot"></div>
                    BTCUSDT • +0.47%
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Action -->
    <div class="px-5">
        <button onclick="simulateSignal()" 
                class="w-full gold-gradient text-black font-black py-8 rounded-3xl text-2xl shadow-2xl shadow-yellow-500/50 active:scale-95 transition-all">
            🟡 ЗОЛОТЕ ОБЛАКО
        </button>
    </div>

    <!-- Signals -->
    <div class="px-5 mt-10">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-xl font-semibold">Останні сигнали</h2>
            <span onclick="clearSignals()" class="text-yellow-400 text-sm cursor-pointer">Очистити</span>
        </div>
        <div id="signals" class="space-y-5"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-black/80 backdrop-blur-lg border-t border-white/10 py-3">
        <div class="flex justify-around text-xs">
            <button onclick="switchTab(0)" class="flex flex-col items-center text-yellow-400">
                <i class="fas fa-home text-2xl mb-1"></i>
                <span>Головна</span>
            </button>
            <button onclick="switchTab(1)" class="flex flex-col items-center">
                <i class="fas fa-list text-2xl mb-1"></i>
                <span>Сигнали</span>
            </button>
            <button onclick="switchTab(2)" class="flex flex-col items-center">
                <i class="fas fa-chart-line text-2xl mb-1"></i>
                <span>Статус</span>
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        function addSignal(symbol, tf, price, expand) {
            const div = document.getElementById("signals");
            const time = new Date().toLocaleTimeString("uk-UA", {hour:"2-digit", minute:"2-digit"});
            
            const html = `
                <div class="signal card rounded-3xl p-6">
                    <div class="flex justify-between">
                        <div>
                            <span class="text-3xl font-bold text-yellow-300">${symbol}</span>
                            <span class="ml-4 text-zinc-400">${tf}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs text-zinc-400">${time}</div>
                            <div class="text-3xl font-bold">${parseInt(price).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="mt-5 flex items-center gap-4">
                        <div class="text-4xl">🟡</div>
                        <div>
                            <div class="font-semibold text-lg">Золоте облако</div>
                            <div class="text-yellow-400">Expand <span class="font-bold">${expand}x</span></div>
                        </div>
                    </div>
                </div>
            `;
            div.innerHTML = html + div.innerHTML;
        }

        function simulateSignal() {
            const symbols = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"];
            const tfs = ["5m", "15m", "30m", "1h"];
            const s = symbols[Math.floor(Math.random()*symbols.length)];
            const t = tfs[Math.floor(Math.random()*tfs.length)];
            const p = Math.floor(40000 + Math.random()*70000);
            const e = (1.35 + Math.random()*0.65).toFixed(2);

            addSignal(s, t, p, e);

            tg.showPopup({
                title: "🟡 ЗОЛОТЕ ОБЛАКО!",
                message: `${s} ${t}\nЦіна: ${p}\nExpand: ${e}x`,
                buttons: [{type: "ok"}]
            });
        }

        function clearSignals() {
            document.getElementById("signals").innerHTML = "";
        }

        function switchTab(n) {
            if (n === 1) alert("Скоро тут буде повна історія сигналів");
            if (n === 2) alert("Скоро тут буде статус моніторингу");
        }

        // Авто-сигнал кожні 18 секунд
        setInterval(() => {
            if (Math.random() > 0.55) simulateSignal();
        }, 18000);

        // Перший сигнал
        window.onload = () => setTimeout(simulateSignal, 700);
    </script>
</body>
</html>
