<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Volatility Manager</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #111827 100%);
            color: #fff;
            font-family: system-ui, sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,234,0,0.15);
        }
        .coin-logo {
            width: 52px;
            height: 52px;
            border-radius: 9999px;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="px-6 pt-10">
        <h1 class="text-4xl font-black tracking-tighter text-center gold">VOLATILITY</h1>
        <p class="text-center text-yellow-400 text-sm -mt-1">MANAGER</p>
    </div>

    <div class="px-5 mt-12 grid grid-cols-2 gap-4">
        
        <!-- BTC -->
        <div onclick="openPair('BTCUSDT')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-4">
                <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" class="coin-logo" alt="BTC">
                <div>
                    <div class="font-bold text-2xl">BTC</div>
                    <div id="btc-price" class="text-2xl font-bold text-white">96 897.34</div>
                </div>
            </div>
            <div id="btc-change" class="mt-4 text-green-400 font-medium">+2.34%</div>
        </div>

        <!-- ETH -->
        <div onclick="openPair('ETHUSDT')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-4">
                <img src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" class="coin-logo" alt="ETH">
                <div>
                    <div class="font-bold text-2xl">ETH</div>
                    <div id="eth-price" class="text-2xl font-bold text-white">3 245.67</div>
                </div>
            </div>
            <div id="eth-change" class="mt-4 text-green-400 font-medium">+1.87%</div>
        </div>

        <!-- SOL -->
        <div onclick="openPair('SOLUSDT')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-4">
                <img src="https://assets.coingecko.com/coins/images/4128/small/solana.png" class="coin-logo" alt="SOL">
                <div>
                    <div class="font-bold text-2xl">SOL</div>
                    <div id="sol-price" class="text-2xl font-bold text-white">184.56</div>
                </div>
            </div>
            <div id="sol-change" class="mt-4 text-red-400 font-medium">-0.92%</div>
        </div>

        <!-- XRP -->
        <div onclick="openPair('XRPUSDT')" class="glass rounded-3xl p-5 cursor-pointer active:scale-95 transition">
            <div class="flex items-center gap-4">
                <img src="https://assets.coingecko.com/coins/images/44/small/xrp-symbol-white-128.png" class="coin-logo" alt="XRP">
                <div>
                    <div class="font-bold text-2xl">XRP</div>
                    <div id="xrp-price" class="text-2xl font-bold text-white">2.34</div>
                </div>
            </div>
            <div id="xrp-change" class="mt-4 text-green-400 font-medium">+4.12%</div>
        </div>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        const pairs = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"];

        async function updatePrices() {
            for (let symbol of pairs) {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
                    const data = await res.json();

                    const price = parseFloat(data.lastPrice);
                    const change = parseFloat(data.priceChangePercent);

                    const priceEl = document.getElementById(symbol.toLowerCase().replace("usdt", "") + "-price");
                    const changeEl = document.getElementById(symbol.toLowerCase().replace("usdt", "") + "-change");

                    if (priceEl) priceEl.textContent = price.toLocaleString('ru-RU', {minimumFractionDigits: 2});
                    if (changeEl) {
                        changeEl.textContent = (change >= 0 ? "+" : "") + change.toFixed(2) + "%";
                        changeEl.className = change >= 0 ? "mt-4 text-green-400 font-medium" : "mt-4 text-red-400 font-medium";
                    }
                } catch(e) {}
            }
        }

        function openPair(symbol) {
            const tf = "15m"; // можна зробити вибір пізніше
            const url = `https://www.tradingview.com/chart/?symbol=BINANCE:${symbol}&interval=15&theme=dark`;
            tg.openLink(url, { try_instant_view: true });
        }

        // Оновлення кожні 400 мс
        setInterval(updatePrices, 400);
        updatePrices();

        window.onload = () => setTimeout(updatePrices, 600);
    </script>
</body>
</html>
